<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" fill="none">
  <rect width="1200" height="800" fill="#f8fafc"/>
  <text x="60" y="60" font-family="system-ui" font-size="24" font-weight="700" fill="#0f172a">MERIDIAN — System Architecture</text>
  <text x="60" y="84" font-family="system-ui" font-size="14" fill="#64748b">Next.js 16 App Router · React 19 · TypeScript 5 · Tailwind CSS v4</text>

  <!-- Client Layer -->
  <rect x="60" y="120" width="1080" height="180" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="60" y="120" width="1080" height="32" rx="12" fill="#f1f5f9"/>
  <rect x="60" y="140" width="1080" height="12" fill="#f1f5f9"/>
  <text x="540" y="140" font-family="system-ui" font-size="13" font-weight="600" fill="#64748b" text-anchor="middle">CLIENT LAYER — Browser</text>
  <!-- Client boxes -->
  <rect x="120" y="176" width="160" height="80" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1"/>
  <text x="200" y="206" font-family="system-ui" font-size="12" font-weight="600" fill="#6366f1" text-anchor="middle">Server Components</text>
  <text x="200" y="228" font-family="system-ui" font-size="10" fill="#6366f1" text-anchor="middle">RSC Payload Stream</text>
  <text x="200" y="244" font-family="system-ui" font-size="10" fill="#6366f1" text-anchor="middle">Zero JS by default</text>

  <rect x="320" y="176" width="160" height="80" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1"/>
  <text x="400" y="206" font-family="system-ui" font-size="12" font-weight="600" fill="#6366f1" text-anchor="middle">Client Components</text>
  <text x="400" y="228" font-family="system-ui" font-size="10" fill="#6366f1" text-anchor="middle">Interactive Islands</text>
  <text x="400" y="244" font-family="system-ui" font-size="10" fill="#6366f1" text-anchor="middle">Framer Motion / Tables</text>

  <rect x="520" y="176" width="160" height="80" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1"/>
  <text x="600" y="206" font-family="system-ui" font-size="12" font-weight="600" fill="#6366f1" text-anchor="middle">React Context</text>
  <text x="600" y="228" font-family="system-ui" font-size="10" fill="#6366f1" text-anchor="middle">Theme · Sidebar</text>
  <text x="600" y="244" font-family="system-ui" font-size="10" fill="#6366f1" text-anchor="middle">UI State</text>

  <rect x="720" y="176" width="160" height="80" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1"/>
  <text x="800" y="206" font-family="system-ui" font-size="12" font-weight="600" fill="#6366f1" text-anchor="middle">shadcn/ui Radix</text>
  <text x="800" y="228" font-family="system-ui" font-size="10" fill="#6366f1" text-anchor="middle">Accessible Primitives</text>
  <text x="800" y="244" font-family="system-ui" font-size="10" fill="#6366f1" text-anchor="middle">Dialog·Table·Select</text>

  <rect x="920" y="176" width="160" height="80" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1"/>
  <text x="1000" y="206" font-family="system-ui" font-size="12" font-weight="600" fill="#6366f1" text-anchor="middle">TanStack Table</text>
  <text x="1000" y="228" font-family="system-ui" font-size="10" fill="#6366f1" text-anchor="middle">Sorting · Filtering</text>
  <text x="1000" y="244" font-family="system-ui" font-size="10" fill="#6366f1" text-anchor="middle">Pagination · Virtual</text>

  <!-- Edge Layer -->
  <rect x="60" y="330" width="1080" height="100" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="60" y="330" width="1080" height="32" rx="12" fill="#f1f5f9"/>
  <rect x="60" y="350" width="1080" height="12" fill="#f1f5f9"/>
  <text x="540" y="350" font-family="system-ui" font-size="13" font-weight="600" fill="#64748b" text-anchor="middle">EDGE / CDN LAYER</text>
  <rect x="120" y="378" width="220" height="36" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="230" y="400" font-family="system-ui" font-size="12" fill="#475569" text-anchor="middle">Vercel Edge Network</text>
  <rect x="380" y="378" width="220" height="36" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="490" y="400" font-family="system-ui" font-size="12" fill="#475569" text-anchor="middle">CDN Cache (Static Assets)</text>
  <rect x="640" y="378" width="220" height="36" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="750" y="400" font-family="system-ui" font-size="12" fill="#475569" text-anchor="middle">Security Headers</text>
  <rect x="900" y="378" width="180" height="36" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="990" y="400" font-family="system-ui" font-size="12" fill="#475569" text-anchor="middle">HSTS / CSP</text>

  <!-- Arrows down -->
  <line x1="200" y1="300" x2="200" y2="330" stroke="#6366f1" stroke-width="2" stroke-dasharray="4"/>
  <line x1="400" y1="300" x2="400" y2="330" stroke="#6366f1" stroke-width="2" stroke-dasharray="4"/>
  <line x1="600" y1="300" x2="600" y2="330" stroke="#6366f1" stroke-width="2" stroke-dasharray="4"/>
  <line x1="800" y1="300" x2="800" y2="330" stroke="#6366f1" stroke-width="2" stroke-dasharray="4"/>
  <line x1="1000" y1="300" x2="1000" y2="330" stroke="#6366f1" stroke-width="2" stroke-dasharray="4"/>

  <!-- Server Layer -->
  <rect x="60" y="460" width="1080" height="150" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="60" y="460" width="1080" height="32" rx="12" fill="#f1f5f9"/>
  <rect x="60" y="480" width="1080" height="12" fill="#f1f5f9"/>
  <text x="540" y="480" font-family="system-ui" font-size="13" font-weight="600" fill="#64748b" text-anchor="middle">SERVER LAYER — Next.js 16 Runtime</text>

  <rect x="90" y="506" width="140" height="80" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
