  <text x="160" y="552" font-family="system-ui" font-size="9" fill="#64748b" text-anchor="middle">File-based routing</text>
  <text x="160" y="568" font-family="system-ui" font-size="9" fill="#64748b" text-anchor="middle">Layout·Page·Loading</text>

  <rect x="260" y="506" width="140" height="80" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="330" y="534" font-family="system-ui" font-size="11" font-weight="600" fill="#475569" text-anchor="middle">Server Actions</text>
  <text x="330" y="552" font-family="system-ui" font-size="9" fill="#64748b" text-anchor="middle">Mutations</text>
  <text x="330" y="568" font-family="system-ui" font-size="9" fill="#64748b" text-anchor="middle">Form handling</text>

  <rect x="430" y="506" width="140" height="80" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="500" y="534" font-family="system-ui" font-size="11" font-weight="600" fill="#475569" text-anchor="middle">API Routes</text>
  <text x="500" y="552" font-family="system-ui" font-size="9" fill="#64748b" text-anchor="middle">REST endpoints</text>
  <text x="500" y="568" font-family="system-ui" font-size="9" fill="#64748b" text-anchor="middle">Webhooks</text>

  <rect x="600" y="506" width="140" height="80" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="670" y="534" font-family="system-ui" font-size="11" font-weight="600" fill="#475569" text-anchor="middle">Middleware</text>
  <text x="670" y="552" font-family="system-ui" font-size="9" fill="#64748b" text-anchor="middle">Auth·Redirects</text>
  <text x="670" y="568" font-family="system-ui" font-size="9" fill="#64748b" text-anchor="middle">Rate limiting</text>

  <rect x="770" y="506" width="140" height="80" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="840" y="534" font-family="system-ui" font-size="11" font-weight="600" fill="#475569" text-anchor="middle">ISR / SSG</text>
  <text x="840" y="552" font-family="system-ui" font-size="9" fill="#64748b" text-anchor="middle">Incremental Static</text>
  <text x="840" y="568" font-family="system-ui" font-size="9" fill="#64748b" text-anchor="middle">Regeneration</text>

  <rect x="940" y="506" width="170" height="80" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="1025" y="534" font-family="system-ui" font-size="11" font-weight="600" fill="#475569" text-anchor="middle">Error Handling</text>
  <text x="1025" y="552" font-family="system-ui" font-size="9" fill="#64748b" text-anchor="middle">error.tsx · loading.tsx</text>
  <text x="1025" y="568" font-family="system-ui" font-size="9" fill="#64748b" text-anchor="middle">not-found.tsx</text>

  <!-- Arrow down -->
  <line x1="200" y1="430" x2="200" y2="460" stroke="#6366f1" stroke-width="2" stroke-dasharray="4"/>
  <line x1="500" y1="430" x2="500" y2="460" stroke="#6366f1" stroke-width="2" stroke-dasharray="4"/>
  <line x1="800" y1="430" x2="800" y2="460" stroke="#6366f1" stroke-width="2" stroke-dasharray="4"/>

  <!-- Data Layer -->
  <rect x="60" y="640" width="1080" height="130" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="60" y="640" width="1080" height="32" rx="12" fill="#f1f5f9"/>
  <rect x="60" y="660" width="1080" height="12" fill="#f1f5f9"/>
  <text x="540" y="660" font-family="system-ui" font-size="13" font-weight="600" fill="#64748b" text-anchor="middle">DATA / INFRASTRUCTURE LAYER</text>
  <rect x="90" y="688" width="240" height="60" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="210" y="714" font-family="system-ui" font-size="12" font-weight="500" fill="#475569" text-anchor="middle">PostgreSQL</text>
  <text x="210" y="734" font-family="system-ui" font-size="10" fill="#64748b" text-anchor="middle">Primary data store</text>
  <rect x="360" y="688" width="240" height="60" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="480" y="714" font-family="system-ui" font-size="12" font-weight="500" fill="#475569" text-anchor="middle">Redis Cache</text>
  <text x="480" y="734" font-family="system-ui" font-size="10" fill="#64748b" text-anchor="middle">Session · Rate limiting</text>
  <rect x="630" y="688" width="240" height="60" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="750" y="714" font-family="system-ui" font-size="12" font-weight="500" fill="#475569" text-anchor="middle">REST API / GraphQL</text>
  <text x="750" y="734" font-family="system-ui" font-size="10" fill="#64748b" text-anchor="middle">Backend services</text>
  <rect x="900" y="688" width="210" height="60" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="1005" y="714" font-family="system-ui" font-size="12" font-weight="500" fill="#475569" text-anchor="middle">Observability</text>
  <text x="1005" y="734" font-family="system-ui" font-size="10" fill="#64748b" text-anchor="middle">Sentry · PostHog</text>
</svg>
